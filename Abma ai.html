<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>abma - Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>
    <style>
        :root {
            --bg-gradient: radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                           radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                           radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            --accent: #00f2fe;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            /* Pure Green Button */
            --btn-green: #0eb582; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Outfit', sans-serif; background-color: #050505; background-image: var(--bg-gradient); background-attachment: fixed; color: #fff; min-height: 100vh; scroll-behavior: smooth; overflow-x: hidden; }

        .glass-panel { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }

        /* Navbar */
        nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 40px; margin: 20px; }
        .logo { font-size: 32px; font-weight: 800; background: linear-gradient(to right, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        
        .icon-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--glass-border); padding: 10px 14px; border-radius: 50%; cursor: pointer; font-size: 20px; transition: 0.3s; display: flex; justify-content: center; align-items: center;}
        .icon-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Dynamic Banner - Desktop Default */
        .banner-container { 
            margin: 20px; border-radius: 20px; position: relative; 
            height: 300px; width: auto; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
        }
        .banner-container img { width: 100%; height: 100%; object-fit: cover; position: absolute; z-index: 1; transition: 0.5s; }
        .banner-container:hover img { transform: scale(1.02); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Premium Search Bar */
        .search-container { margin-bottom: 30px; position: relative; }
        .search-bar { 
            width: 100%; padding: 15px 20px 15px 50px; font-size: 16px; 
            background: rgba(0,0,0,0.4); border: 1px solid var(--glass-border); 
            border-radius: 15px; color: white; outline: none; font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 254, 0.2); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 20px; }

        /* Product Grid & Cards */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card { padding: 15px; transition: 0.4s; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 10px 30px rgba(0, 242, 254, 0.15); }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 15px; margin-bottom: 15px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .platform-tag { font-size: 12px; font-weight: 600; color: var(--accent); background: rgba(0, 242, 254, 0.1); padding: 4px 10px; border-radius: 8px; }
        .price-tag { font-weight: 800; font-size: 20px; color: #fff; }
        .product-title { font-weight: 600; font-size: 1.2rem; margin-bottom: 5px; line-height: 1.3; }
        .product-desc { font-size: 13px; color: #aaa; margin-bottom: 10px; flex-grow: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-weight: 300; }
        .stars { color: #ffd700; font-size: 14px; margin-bottom: 15px; }

        /* Action Buttons Area */
        .card-actions { display: flex; gap: 10px; margin-top: 10px; align-items: center; }

        /* BUY Button */
        .buy-btn {
            flex-grow: 1; text-align: center; text-decoration: none; padding: 14px; border-radius: 12px; 
            font-weight: 800; font-size: 16px; color: #fff; letter-spacing: 2px; text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            background: var(--btn-green); box-shadow: 0 0 15px rgba(14, 181, 130, 0.3); transition: all 0.3s ease;
        }
        .buy-btn:hover { background: #10c991; transform: scale(1.03); box-shadow: 0 0 25px rgba(16, 201, 145, 0.6); }

        /* Share Button */
        .share-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;
            padding: 14px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-size: 18px;
            display: flex; align-items: center; justify-content: center; width: 50px;
        }
        .share-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Admin Dashboard UI */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .admin-container { width: 90%; max-width: 800px; height: 85vh; display: flex; flex-direction: column; overflow: hidden; font-family: 'Outfit', sans-serif;}
        .admin-header { padding: 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
        .admin-tabs { display: flex; gap: 10px; padding: 15px 20px; border-bottom: 1px solid var(--glass-border); overflow-x: auto; scrollbar-width: none; }
        .admin-tabs::-webkit-scrollbar { display: none; } /* Hide scrollbar for tabs on mobile */
        .tab-btn { background: transparent; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-family: 'Outfit', sans-serif; font-weight: 600; white-space: nowrap;}
        .tab-btn.active, .tab-btn:hover { background: var(--accent); color: black; border-color: var(--accent); }
        .admin-body { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.5); border: 1px solid #444; border-radius: 10px; color: white; outline: none; font-family: 'Outfit', sans-serif;}
        input:focus, textarea:focus { border-color: var(--accent); }
        .action-btn { background: var(--accent); color: #000; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 16px; width: 100%; font-family: 'Outfit', sans-serif;}
        
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .manage-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .manage-info { flex-grow: 1; margin: 0 10px; overflow: hidden; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: 'Outfit', sans-serif;}

        .hidden { display: none !important; }

        /* ==================================================== */
        /* MOBILE APP OPTIMIZATION (Media Queries)             */
        /* ==================================================== */
        @media (max-width: 768px) {
            nav { padding: 12px 20px; margin: 10px; }
            .logo { font-size: 26px; }
            .icon-btn { padding: 8px 12px; font-size: 18px; }
            
            /* Banner shrinks on phone to look like a hero section */
            .banner-container { height: 180px; margin: 10px; border-radius: 15px; }
            
            .container { padding: 10px; }
            .search-container { margin-bottom: 20px; }
            .search-bar { padding: 12px 15px 12px 45px; font-size: 15px; border-radius: 12px; }
            
            /* Cards take full width on phone for app-feed look */
            .product-grid { grid-template-columns: 1fr; gap: 20px; }
            .product-card { padding: 12px; border-radius: 15px; }
            .product-card img { height: 180px; border-radius: 12px; }
            .product-title { font-size: 1.1rem; }
            .buy-btn { padding: 12px; font-size: 15px; }
            
            /* Admin Panel fits phone perfectly */
            .admin-container { width: 95%; height: 90vh; }
            .admin-header { padding: 15px; }
            .admin-body { padding: 15px; }
        }
    </style>
</head>
<body>

    <nav class="glass-panel">
        <div class="logo" id="site-logo">abma</div>
        <button class="icon-btn" onclick="showLogin()" title="Admin Login"><i class="ri-user-3-line"></i></button>
    </nav>

    <div class="banner-container glass-panel" id="main-banner">
        <img id="banner-img" src="https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?auto=format&fit=crop&w=1200&q=80" alt="Banner">
    </div>

    <div class="container">
        <div class="search-container">
            <i class="ri-search-line search-icon"></i>
            <input type="text" id="search-input" class="search-bar" placeholder="Search products..." onkeyup="filterProducts()">
        </div>

        <div class="product-grid" id="products-container">
            <h3 style="text-align: center; width: 100%; color: var(--accent); font-weight: 300;">Loading Premium Catalog...</h3>
        </div>
    </div>

    <div id="login-modal" class="modal hidden">
        <div class="glass-panel" style="padding: 30px; width: 90%; max-width: 350px;">
            <h2 style="margin-top:0; text-align:center; font-weight: 800;">Admin Access</h2>
            <input type="password" id="admin-pass" placeholder="Enter Password">
            <button class="action-btn" onclick="checkPassword()">Login</button>
            <button style="background:transparent; color:#aaa; border:none; width:100%; margin-top:10px; cursor:pointer; font-family: 'Outfit', sans-serif;" onclick="closeModals()">Cancel</button>
        </div>
    </div>

    <div id="admin-dashboard" class="modal hidden">
        <div class="admin-container glass-panel">
            <div class="admin-header">
                <h2 style="margin: 0; font-weight: 800; font-size: 20px;">Control Panel</h2>
                <button class="del-btn" style="background: transparent; border: 1px solid #ff4d4d; padding: 6px 10px;" onclick="closeModals()">Exit</button>
            </div>
            
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('add-tab')">Add</button>
                <button class="tab-btn" onclick="switchTab('manage-tab')">Manage</button>
                <button class="tab-btn" onclick="switchTab('settings-tab')">Edit Look</button>
            </div>

            <div class="admin-body">
                <div id="add-tab" class="tab-content">
                    <input type="text" id="p-title" placeholder="Product Title">
                    <input type="text" id="p-price" placeholder="Price (e.g. ₹999)">
                    <textarea id="p-desc" rows="2" placeholder="Short Description"></textarea>
                    <input type="text" id="p-image" placeholder="Image URL">
                    <input type="text" id="p-link" placeholder="Affiliate Tracking Link">
                    <div style="display: flex; gap: 10px;">
                        <select id="p-platform">
                            <option value="Amazon">Amazon</option>
                            <option value="Flipkart">Flipkart</option>
                            <option value="Meesho">Meesho</option>
                        </select>
                        <select id="p-rating">
                            <option value="5">⭐⭐⭐⭐⭐</option>
                            <option value="4">⭐⭐⭐⭐</option>
                            <option value="3">⭐⭐⭐</option>
                        </select>
                    </div>
                    <button class="action-btn" onclick="addProduct()">Publish Product</button>
                </div>

                <div id="manage-tab" class="tab-content hidden">
                    <div id="manage-list">Loading products...</div>
                </div>

                <div id="settings-tab" class="tab-content hidden">
                    <h3 style="margin-top:0; font-weight: 600;">Edit Website Look</h3>
                    <label style="font-size: 14px; color: #aaa;">Website Name</label>
                    <input type="text" id="s-logo" placeholder="e.g. abma">
                    
                    <label style="font-size: 14px; color: #aaa; margin-top:10px; display:block;">Banner Image URL (Best: 1200x300px)</label>
                    <input type="text" id="s-banner-img" placeholder="Paste HD Image Link">
                    
                    <button class="action-btn" style="margin-top: 15px;" onclick="saveSettings()">Update Website Live</button>
                    <p style="font-size: 12px; color: #888; text-align: center; margin-top: 15px;">*Leave blank to use default template values.</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, set, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAkUa3sGuTEsmaDip1v9at7eusfcQlEa4M",
            authDomain: "abma-7db22.firebaseapp.com",
            databaseURL: "https://abma-7db22-default-rtdb.firebaseio.com",
            projectId: "abma-7db22",
            storageBucket: "abma-7db22.firebasestorage.app",
            messagingSenderId: "260695378646",
            appId: "1:260695378646:web:a0f380079936b1aa0f5777"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const productsRef = ref(db, 'products');
        const settingsRef = ref(db, 'settings');

        function getStars(num) {
            return "⭐".repeat(num);
        }

        // Fetch Settings
        onValue(settingsRef, (snapshot) => {
            const data = snapshot.val();
            if(data) {
                if(data.logoName) {
                    document.getElementById('site-logo').innerText = data.logoName;
                    document.getElementById('s-logo').value = data.logoName;
                }
                if(data.bannerImg) {
                    document.getElementById('banner-img').src = data.bannerImg;
                    document.getElementById('s-banner-img').value = data.bannerImg;
                }
            }
        });

        // Fetch Products
        onValue(productsRef, (snapshot) => {
            const storeContainer = document.getElementById('products-container');
            const manageList = document.getElementById('manage-list');
            storeContainer.innerHTML = '';
            manageList.innerHTML = '';

            const data = snapshot.val();
            if (data) {
                Object.entries(data).reverse().forEach(([id, prod]) => {
                    const card = document.createElement('div');
                    card.className = 'product-card glass-panel';
                    card.id = 'prod-' + id; 
                    card.innerHTML = `
                        <img src="${prod.image}" alt="Product">
                        <div class="card-header">
                            <span class="platform-tag">${prod.platform}</span>
                            <span class="price-tag">${prod.price || ''}</span>
                        </div>
                        <div class="product-title">${prod.title}</div>
                        <div class="stars">${getStars(prod.rating || 5)}</div>
                        <div class="product-desc">${prod.description || 'Premium quality product available at best price.'}</div>
                        <div class="card-actions">
                            <a href="${prod.link}" target="_blank" class="buy-btn">BUY</a>
                            <button class="share-btn" onclick="shareProduct('${id}', '${prod.title}')" title="Share Product"><i class="ri-share-forward-line"></i></button>
                        </div>
                    `;
                    storeContainer.appendChild(card);

                    const item = document.createElement('div');
                    item.className = 'manage-item glass-panel';
                    item.style.marginBottom = "10px";
                    item.innerHTML = `
                        <img src="${prod.image}">
                        <div class="manage-info">
                            <div style="font-weight:bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${prod.title}</div>
                            <div style="font-size:12px; color:#aaa">${prod.price || 'No Price'}</div>
                        </div>
                        <button class="del-btn" onclick="deleteProduct('${id}')"><i class="ri-delete-bin-line"></i></button>
                    `;
                    manageList.appendChild(item);
                });

                // Auto Scroll logic for Shared Links
                const urlParams = new URLSearchParams(window.location.search);
                const sharedPid = urlParams.get('pid');
                if(sharedPid) {
                    setTimeout(() => {
                        const targetElement = document.getElementById('prod-' + sharedPid);
                        if(targetElement) {
                            targetElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetElement.style.boxShadow = "0 0 30px #0eb582"; 
                            targetElement.style.borderColor = "#0eb582";
                        }
                    }, 800); 
                }

            } else { 
                storeContainer.innerHTML = "<h3 style='width:100%; text-align:center; font-weight:300;'>No Deals Available Currently.</h3>";
                manageList.innerHTML = "No products found.";
            }
        });

        // Search/Filter Function
        window.filterProducts = () => {
            let filter = document.getElementById('search-input').value.toUpperCase();
            let cards = document.getElementById("products-container").getElementsByClassName('product-card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName("product-title")[0];
                if (title) {
                    let textValue = title.textContent || title.innerText;
                    if (textValue.toUpperCase().indexOf(filter) > -1) {
                        cards[i].style.display = "";
                    } else {
                        cards[i].style.display = "none";
                    }
                }       
            }
        };

        // Smart Share Logic
