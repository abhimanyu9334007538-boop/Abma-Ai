<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abma AI | Supreme Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap');

        :root {
            --glass: rgba(255, 255, 255, 0.04);
            --glass-thick: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: #020617;
            background-image: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, #0f172a 0%, transparent 50%);
            height: 100vh; height: 100dvh; 
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; color: white;
        }

        /* Startup Screen */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px;
        }
        #wake-btn {
            padding: 15px 40px; font-size: 1.2rem; border-radius: 30px;
            background: white; color: black; border: none; cursor: pointer;
            font-weight: 600; box-shadow: 0 0 20px rgba(255,255,255,0.2);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #wake-btn:active { transform: scale(0.92); }

        /* Main Console */
        .console {
            width: 100vw; height: 100vh; height: 100dvh;
            background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            display: none; flex-direction: column; position: relative;
        }

        @media (min-width: 768px) {
            .console {
                width: 95vw; max-width: 900px; height: 92vh;
                border: 1px solid var(--border); border-radius: 30px;
            }
        }

        /* Header */
        .top-bar {
            padding: 15px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3);
        }
        .brand { display: flex; flex-direction: column; }
        .brand h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; letter-spacing: 3px; }
        .watermark { font-size: 0.65rem; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
        .pulse { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 12px #4ade80; animation: pulse 1.5s infinite; }

        /* Chat Area */
        #chat-engine {
            flex: 1; overflow-y: auto; padding: 25px 20px;
            display: flex; flex-direction: column; gap: 20px;
            scrollbar-width: none;
        }
        #chat-engine::-webkit-scrollbar { display: none; }

        /* Bubbles */
        .bubble {
            max-width: 85%; padding: 16px 22px; border-radius: 20px;
            font-size: 1.05rem; line-height: 1.5; animation: popIn 0.4s ease-out forwards;
        }
        .bot-bubble {
            background: var(--glass-thick); align-self: flex-start;
            border: 1px solid var(--border); border-bottom-left-radius: 4px; color: #f8fafc;
        }
        .user-bubble {
            background: linear-gradient(135deg, #1d4ed8, #3b82f6); 
            color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        /* Input Area */
        .input-deck {
            padding: 15px 20px; background: rgba(0,0,0,0.5);
            border-top: 1px solid var(--border); display: flex; gap: 12px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }
        .input-container {
            flex: 1; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 25px;
            display: flex; align-items: center; padding: 0 20px;
        }
        input {
            width: 100%; height: 55px; background: transparent; border: none;
            color: white; font-size: 1.05rem; outline: none;
        }

        .action-btn {
            width: 55px; height: 55px; background: white; border: none;
            border-radius: 50%; cursor: pointer; display: grid; place-items: center;
        }

        @keyframes popIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-family: 'Space Grotesk'; letter-spacing: 5px; text-align: center;">ABMA SYSTEM<br><span style="font-size: 10px; color: #94a3b8; letter-spacing: 2px;">SECURE CONNECTION</span></h2>
        <button id="wake-btn">Tap to Start</button>
    </div>

    <div class="console" id="main-console">
        <div class="top-bar">
            <div class="brand">
                <h2>ABMA AI</h2>
                <div class="watermark">design by Abhimanyu Singh</div>
            </div>
            <div class="pulse"></div>
        </div>
        <div id="chat-engine"></div>
        <div class="input-deck">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Message Abma..." autocomplete="off">
            </div>
            <button class="action-btn" id="sendBtn">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

<script>
    const startScreen = document.getElementById('start-screen');
    const mainConsole = document.getElementById('main-console');
    const chatEngine = document.getElementById('chat-engine');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    let inactivityTimer = null;
    let isBotTyping = false;

    // Start App
    document.getElementById('wake-btn').onclick = () => {
        startScreen.style.display = 'none';
        mainConsole.style.display = 'flex';
        addBubble("Jay Shri Ram | Jay Bhagwan Parshuram. Main Abma hoon, hazir hoon!", 'bot-bubble');
        resetTimer();
    };

    function resetTimer() {
        clearTimeout(inactivityTimer);
        if (!isBotTyping) {
            inactivityTimer = setTimeout(() => {
                addBubble("Boss, kuch bolo to!", 'bot-bubble');
            }, 10000);
        }
    }

    userInput.addEventListener('input', resetTimer);

    function addBubble(text, className) {
        const b = document.createElement('div');
        b.className = `bubble ${className}`;
        b.innerText = text;
        chatEngine.appendChild(b);
        chatEngine.scrollTo({ top: chatEngine.scrollHeight, behavior: 'smooth' });
        return b;
    }

    async function handleChat() {
        const query = userInput.value.trim();
        if(!query) return;

        addBubble(query, 'user-bubble');
        userInput.value = "";
        clearTimeout(inactivityTimer);

        isBotTyping = true;
        const botThinking = addBubble("Khoj kar de raha hoon...", "bot-bubble");

        try {
            // Vercel backend call
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: query })
            });

            const data = await res.json();
            if(!res.ok) throw new Error(data.error || "Server error");

            botThinking.innerText = data.reply;
            isBotTyping = false;
            resetTimer();

        } catch(err) {
            botThinking.innerText = "⚠️ Error: Backend se connection fail.";
            isBotTyping = false;
            resetTimer();
        }
    }

    sendBtn.onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
</script>
</body>
</html>
