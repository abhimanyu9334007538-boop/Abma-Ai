<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Abma AI | Fixed</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: #020617; color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 1rem; }
        .bot { background: rgba(255,255,255,0.08); align-self: flex-start; }
        .user { background: #2563eb; align-self: flex-end; }
        .input-box { padding: 15px; display: flex; gap: 10px; background: #020617; border-top: 1px solid rgba(255,255,255,0.1); padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        input { flex: 1; height: 48px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 25px; padding: 0 15px; color: white; outline: none; }
        button { width: 48px; height: 48px; border-radius: 50%; border: none; background: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="letter-spacing: 2px;">ABMA AI</h2>
        <p style="font-size: 0.6rem; color: #94a3b8;">BY ABHIMANYU SINGH</p>
    </div>
    <div id="chat"></div>
    <div class="input-box">
        <input type="text" id="userInput" placeholder="Ask me..." autocomplete="off">
        <button id="sendBtn">➤</button>
    </div>
<script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('userInput');

    window.onload = () => addMsg("Jay Shri Ram, mujhe Abhimanyu sir ne banaya hai.", 'bot');

    function addMsg(text, type) {
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerText = text;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
        return d;
    }

    async function talk() {
        const val = input.value.trim();
        if(!val) return;
        addMsg(val, 'user');
        input.value = "";
        const loader = addMsg("Thinking...", 'bot');

        try {
            const res = await fetch("/api/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ message: val })
            });
            const data = await res.json();
            loader.innerText = data.reply || "Error: " + data.error;
        } catch(e) {
            loader.innerText = "Backend Connection Error. Check Folder Structure.";
        }
    }
    document.getElementById('sendBtn').onclick = talk;
    input.onkeypress = (e) => { if(e.key === 'Enter') talk(); };
</script>
</body>
</html>
