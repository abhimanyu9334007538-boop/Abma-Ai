<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Abma AI | DeepSeek Flash</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap');
        
        :root { --glass: rgba(255, 255, 255, 0.04); --border: rgba(255, 255, 255, 0.12); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { height: 100%; width: 100%; overflow: hidden; background: #020617; position: fixed; }
        body {
            background-image: radial-gradient(circle at 10% 20%, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, #0f172a 0%, transparent 40%);
            display: flex; flex-direction: column;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }

        #wake-btn {
            padding: 16px 45px; font-size: 1.1rem; border-radius: 40px;
            background: white; color: black; border: none; cursor: pointer;
            font-weight: 700; box-shadow: 0 0 30px rgba(255,255,255,0.25);
        }

        .console { flex: 1; display: none; flex-direction: column; width: 100%; height: 100%; background: var(--glass); backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px); }

        .top-bar { padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.4); height: 70px; }
        .brand h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; letter-spacing: 3px; color: white; }
        .watermark { font-size: 0.6rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }

        #chat-engine { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        #chat-engine::-webkit-scrollbar { display: none; }

        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5; animation: pop 0.3s ease; color: white; word-wrap: break-word; }
        .bot-bubble { background: rgba(255, 255, 255, 0.08); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user-bubble { background: linear-gradient(135deg, #2563eb, #3b82f6); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 5px 15px rgba(37, 99, 235, 0.2); }

        .input-deck { 
            padding: 15px; background: #020617; border-top: 1px solid var(--border); 
            display: flex; gap: 12px; align-items: center;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .input-container { flex: 1; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 0 20px; border: 1px solid var(--border); }
        input { width: 100%; height: 50px; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .action-btn { width: 50px; height: 50px; background: white; border-radius: 50%; border: none; flex-shrink: 0; display: grid; place-items: center; cursor: pointer; }

        @keyframes pop { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-family: 'Space Grotesk'; letter-spacing: 6px; color: white;">ABMA AI</h2>
        <button id="wake-btn">INITIALIZE</button>
    </div>

    <div class="console" id="main-console">
        <div class="top-bar">
            <div class="brand">
                <h2>ABMA AI</h2>
                <div class="watermark">design by Abhimanyu Singh</div>
            </div>
            <div style="width: 10px; height: 10px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 10px #22c55e;"></div>
        </div>
        <div id="chat-engine"></div>
        <div class="input-deck">
            <div class="input-container"><input type="text" id="userInput" placeholder="Ask DeepSeek..." autocomplete="off"></div>
            <button class="action-btn" id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Teri working Groq Key
    const API_KEY = "Gsk_52pEYmlbjTZzxEElbUtlWGdyb3FYptw2jojjyxz4YhpI5V1Bhpyg";

    const chatEngine = document.getElementById('chat-engine');
    const userInput = document.getElementById('userInput');

    document.getElementById('wake-btn').onclick = () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-console').style.display = 'flex';
        addBubble("Jay Shri Ram, mujhe Abhimanyu sir ne banaya hai.", 'bot-bubble');
    };

    function addBubble(text, className) {
        const b = document.createElement('div');
        b.className = `bubble ${className}`;
        b.innerText = text;
        chatEngine.appendChild(b);
        chatEngine.scrollTop = chatEngine.scrollHeight;
        return b;
    }

    async function handleChat() {
        const msg = userInput.value.trim();
        if(!msg) return;

        addBubble(msg, 'user-bubble');
        userInput.value = "";
        
        const botBubble = addBubble("Thinking...", 'bot-bubble');

        try {
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "deepseek-r1-distill-llama-70b",
                    messages: [{ role: "user", content: msg }]
                })
            });

            const data = await response.json();
            if (data.choices && data.choices[0].message) {
                botBubble.innerText = data.choices[0].message.content;
            } else {
                botBubble.innerText = "Error: Key or Limit issue.";
            }
        } catch(e) {
            botBubble.innerText = "Connection Failed.";
        }
        chatEngine.scrollTop = chatEngine.scrollHeight;
    }

    document.getElementById('sendBtn').onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            chatEngine.scrollTop = chatEngine.scrollHeight;
        });
    }
</script>
</body>
</html>
