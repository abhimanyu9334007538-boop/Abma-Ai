<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Abma AI | Elite Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap');
        
        :root { 
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.1); 
            --accent: #3b82f6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: #020617; position: fixed; 
        }

        body {
            background-image: radial-gradient(circle at 15% 25%, #1e1b4b 0%, transparent 45%),
                              radial-gradient(circle at 85% 75%, #0f172a 0%, transparent 45%);
            display: flex; flex-direction: column;
        }

        /* Full Screen Console */
        .console {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            background: var(--glass);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
        }

        /* Premium Top Bar */
        .top-bar { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            background: rgba(0,0,0,0.4);
            height: 75px;
        }

        .brand h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; letter-spacing: 4px; color: white; font-weight: 700; }
        .watermark { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px; }

        .status-dot { 
            width: 10px; height: 10px; background: #22c55e; border-radius: 50%; 
            box-shadow: 0 0 12px #22c55e; position: relative;
        }

        /* Chat Engine - Scrollable Area */
        #chat-engine { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 18px; 
            scrollbar-width: none;
        }
        #chat-engine::-webkit-scrollbar { display: none; }

        /* Modern Bubbles */
        .bubble { 
            max-width: 85%; padding: 15px 20px; border-radius: 24px; 
            font-size: 1rem; line-height: 1.6; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: rgba(255,255,255,0.9); word-wrap: break-word;
        }
        
        .bot-bubble { 
            background: rgba(255, 255, 255, 0.06); 
            align-self: flex-start; 
            border: 1px solid var(--border); 
            border-bottom-left-radius: 4px; 
        }

        .user-bubble { 
            background: linear-gradient(135deg, #2563eb, #1d4ed8); 
            align-self: flex-end; 
            border-bottom-right-radius: 4px; 
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.2);
        }

        /* Premium Input Deck */
        .input-deck { 
            padding: 15px 20px; 
            background: rgba(0,0,0,0.6); 
            border-top: 1px solid var(--border); 
            display: flex; 
            gap: 12px; 
            align-items: center;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .input-container { 
            flex: 1; 
            background: rgba(255,255,255,0.05); 
            border-radius: 30px; 
            padding: 0 20px; 
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .input-container:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.08); }

        input { 
            width: 100%; height: 50px; background: transparent; 
            border: none; color: white; outline: none; font-size: 16px; 
        }

        .action-btn { 
            width: 50px; height: 50px; background: white; border-radius: 50%; 
            border: none; flex-shrink: 0; display: grid; place-items: center; 
            cursor: pointer; transition: 0.2s;
        }

        .action-btn:active { transform: scale(0.9); background: #e2e8f0; }

        /* Loader Animation */
        .typing { font-size: 0.8rem; color: #94a3b8; margin-left: 5px; }

        @keyframes popIn { 
            from { opacity: 0; transform: translateY(15px) scale(0.95); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
    </style>
</head>
<body>

    <div class="console" id="main-console">
        <div class="top-bar">
            <div class="brand">
                <h2>ABMA AI</h2>
                <div class="watermark">design by Abhimanyu Singh</div>
            </div>
            <div class="status-dot"></div>
        </div>

        <div id="chat-engine"></div>

        <div class="input-deck">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Type your command..." autocomplete="off">
            </div>
            <button class="action-btn" id="sendBtn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

<script>
    const chatEngine = document.getElementById('chat-engine');
    const userInput = document.getElementById('userInput');

    // Startup Message
    window.onload = () => {
        addBubble("Jay Shri Ram, mujhe Abhimanyu sir ne banaya hai. Main tayyar hoon.", 'bot-bubble');
    };

    function addBubble(text, className) {
        const b = document.createElement('div');
        b.className = `bubble ${className}`;
        b.innerText = text;
        chatEngine.appendChild(b);
        scrollToBottom();
        return b;
    }

    function scrollToBottom() {
        chatEngine.scrollTo({ top: chatEngine.scrollHeight, behavior: 'smooth' });
    }

    async function handleChat() {
        const msg = userInput.value.trim();
        if(!msg) return;

        addBubble(msg, 'user-bubble');
        userInput.value = "";
        
        const botBubble = addBubble("Thinking...", 'bot-bubble');

        try {
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();
            if (response.ok) {
                botBubble.innerText = data.reply;
            } else {
                botBubble.innerText = "Error: " + (data.error || "Check Backend.");
            }
        } catch(e) {
            botBubble.innerText = "Backend Connection Error. Check Folder Structure.";
        }
        scrollToBottom();
    }

    document.getElementById('sendBtn').onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    // Mobile Keyboard Fix
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            scrollToBottom();
        });
    }
</script>
</body>
</html>
