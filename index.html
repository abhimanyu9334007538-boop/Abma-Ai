<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abma AI | System Live</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap');
        
        :root { 
            --glass: rgba(255, 255, 255, 0.04); 
            --border: rgba(255, 255, 255, 0.15); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background: #020617;
            background-image: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, #0f172a 0%, transparent 50%);
            height: 100vh; height: 100dvh; display: flex; justify-content: center; align-items: center; overflow: hidden;
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 100; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }

        #wake-btn {
            padding: 15px 40px; font-size: 1.2rem; border-radius: 30px;
            background: white; color: black; border: none; cursor: pointer;
            font-weight: 600; box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }

        .console {
            width: 100vw; height: 100vh; background: var(--glass);
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            display: none; flex-direction: column;
        }

        @media (min-width: 768px) {
            .console { width: 90vw; max-width: 800px; height: 85vh; border-radius: 30px; border: 1px solid var(--border); }
        }

        .top-bar { padding: 15px 25px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.3); }
        .brand h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; letter-spacing: 3px; color: white; }
        .watermark { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-top: 2px; }

        #chat-engine { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scrollbar-width: none; }
        #chat-engine::-webkit-scrollbar { display: none; }

        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 20px; font-size: 1rem; line-height: 1.5; animation: popIn 0.3s ease; color: white; }
        .bot-bubble { background: rgba(255, 255, 255, 0.08); align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .user-bubble { background: linear-gradient(135deg, #1d4ed8, #3b82f6); align-self: flex-end; border-bottom-right-radius: 4px; }

        .input-deck { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.5); border-top: 1px solid var(--border); padding-bottom: max(15px, env(safe-area-inset-bottom)); }
        .input-container { flex: 1; background: rgba(255,255,255,0.06); border-radius: 25px; padding: 0 20px; border: 1px solid var(--border); }
        input { width: 100%; height: 50px; background: transparent; border: none; color: white; outline: none; }
        .action-btn { width: 50px; height: 50px; background: white; border-radius: 50%; border: none; cursor: pointer; display: grid; place-items: center; }

        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-family: 'Space Grotesk'; letter-spacing: 5px; color: white;">ABMA AI</h2>
        <button id="wake-btn">INITIALIZE</button>
    </div>

    <div class="console" id="main-console">
        <div class="top-bar">
            <div class="brand">
                <h2>ABMA AI</h2>
                <div class="watermark">design by Abhimanyu Singh</div>
            </div>
            <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80;"></div>
        </div>

        <div id="chat-engine"></div>

        <div class="input-deck">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Abhimanyu sir ka AI..." autocomplete="off">
            </div>
            <button class="action-btn" id="sendBtn">➤</button>
        </div>
    </div>

<script>
    // Teri API Key maine integrate kar di hai bhai
    const API_KEY = "AIzaSyChXIkvfci1R6DAwPmE_FAebzvtbvH859o";

    const chatEngine = document.getElementById('chat-engine');
    const userInput = document.getElementById('userInput');
    const startScreen = document.getElementById('start-screen');
    const mainConsole = document.getElementById('main-console');

    document.getElementById('wake-btn').onclick = () => {
        startScreen.style.display = 'none';
        mainConsole.style.display = 'flex';
        // Starting message as requested
        addBubble("Jay Shri Ram, mujhe Abhimanyu sir ne banaya hai.", 'bot-bubble');
    };

    function addBubble(text, className) {
        const b = document.createElement('div');
        b.className = `bubble ${className}`;
        b.innerText = text;
        chatEngine.appendChild(b);
        chatEngine.scrollTo({ top: chatEngine.scrollHeight, behavior: 'smooth' });
        return b;
    }

    async function handleChat() {
        const msg = userInput.value.trim();
        if(!msg) return;

        addBubble(msg, 'user-bubble');
        userInput.value = "";
        
        const botBubble = addBubble("Sosh raha hoon...", 'bot-bubble');

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: msg }] }]
                })
            });

            const data = await response.json();

            if (data.error) {
                botBubble.innerText = "⚠️ API Key Issue: " + data.error.message;
            } else {
                botBubble.innerText = data.candidates[0].content.parts[0].text;
            }

        } catch(e) {
            botBubble.innerText = "⚠️ Error: Connection Fail.";
        }
    }

    document.getElementById('sendBtn').onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };
</script>
</body>
</html>
