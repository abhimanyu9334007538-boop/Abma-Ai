<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
    <title>Abma AI | Supreme Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap');
        
        :root { 
            --glass: rgba(255, 255, 255, 0.04); 
            --border: rgba(255, 255, 255, 0.15); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        html, body { 
            height: 100%; width: 100%; overflow: hidden; 
            background: #020617; position: fixed; 
        }

        body {
            background-image: radial-gradient(circle at 20% 30%, #1e1b4b 0%, transparent 50%),
                              radial-gradient(circle at 80% 70%, #0f172a 0%, transparent 50%);
            display: flex; flex-direction: column;
        }

        /* Startup Layer */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #020617; z-index: 1000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; gap: 20px;
        }

        #wake-btn {
            padding: 15px 45px; font-size: 1.2rem; border-radius: 35px;
            background: white; color: black; border: none; cursor: pointer;
            font-weight: 700; box-shadow: 0 0 25px rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        /* Chat Console */
        .console { flex: 1; display: none; flex-direction: column; width: 100%; height: 100%; background: var(--glass); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); }

        .top-bar { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.6); height: 70px; }
        .brand h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.2rem; letter-spacing: 3px; color: white; }
        .watermark { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; margin-top: 2px; font-weight: 400; }

        #chat-engine { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #chat-engine::-webkit-scrollbar { display: none; }

        .bubble { max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 1rem; line-height: 1.5; animation: popIn 0.3s ease; color: white; word-wrap: break-word; }
        .bot-bubble { background: rgba(255, 255, 255, 0.07); align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .user-bubble { background: linear-gradient(135deg, #1d4ed8, #3b82f6); align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3); }

        /* Input Area Fix for Mobile */
        .input-deck { 
            padding: 12px 18px; background: #010409; border-top: 1px solid var(--border); 
            display: flex; gap: 12px; align-items: center;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }

        .input-container { flex: 1; background: rgba(255,255,255,0.05); border-radius: 30px; padding: 0 20px; border: 1px solid var(--border); display: flex; align-items: center; }
        input { width: 100%; height: 50px; background: transparent; border: none; color: white; outline: none; font-size: 16px; }
        .action-btn { width: 50px; height: 50px; background: white; border-radius: 50%; border: none; flex-shrink: 0; display: grid; place-items: center; cursor: pointer; }

        @keyframes popIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="font-family: 'Space Grotesk'; letter-spacing: 6px; color: white;">ABMA AI</h2>
        <button id="wake-btn">INITIALIZE</button>
    </div>

    <div class="console" id="main-console">
        <div class="top-bar">
            <div class="brand">
                <h2>ABMA AI</h2>
                <div class="watermark">design by Abhimanyu Singh</div>
            </div>
            <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80;"></div>
        </div>

        <div id="chat-engine"></div>

        <div class="input-deck">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Ask Abhimanyu sir's AI..." autocomplete="off">
            </div>
            <button class="action-btn" id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

<script>
    const chatEngine = document.getElementById('chat-engine');
    const userInput = document.getElementById('userInput');
    const startScreen = document.getElementById('start-screen');
    const mainConsole = document.getElementById('main-console');

    document.getElementById('wake-btn').onclick = () => {
        startScreen.style.display = 'none';
        mainConsole.style.display = 'flex';
        addBubble("Jay Shri Ram, mujhe Abhimanyu sir ne banaya hai.", 'bot-bubble');
    };

    function addBubble(text, className) {
        const b = document.createElement('div');
        b.className = `bubble ${className}`;
        b.innerText = text;
        chatEngine.appendChild(b);
        chatEngine.scrollTop = chatEngine.scrollHeight;
        return b;
    }

    async function handleChat() {
        const msg = userInput.value.trim();
        if(!msg) return;

        addBubble(msg, 'user-bubble');
        userInput.value = "";
        
        const botBubble = addBubble("Sosh raha hoon...", 'bot-bubble');

        try {
            // Calling Vercel Backend
            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();

            if (response.ok) {
                botBubble.innerText = data.reply;
            } else {
                botBubble.innerText = "Error: " + (data.error || "Backend fail.");
            }
        } catch(e) {
            botBubble.innerText = "Backend Connection Error. Path ya deployment check karo.";
        }
        chatEngine.scrollTop = chatEngine.scrollHeight;
    }

    document.getElementById('sendBtn').onclick = handleChat;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') handleChat(); };

    // Resize handling for mobile keyboards
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            chatEngine.scrollTop = chatEngine.scrollHeight;
        });
    }
</script>
</body>
</html>
